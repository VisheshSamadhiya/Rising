<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mini Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>🛒 Mini E-Commerce Store</h1>
  <div class="cart">
    Cart: <span id="cart-count">0</span>
  </div>
</header>

<section class="products">

  <div class="product">
    <h2>Phone</h2>
    <p>₹15,000</p>
    <button onclick="addToCart('Phone', 15000)">Add to Cart</button>
  </div>

  <div class="product">
    <h2>Laptop</h2>
    <p>₹55,000</p>
    <button onclick="addToCart('Laptop', 55000)">Add to Cart</button>
  </div>

  <div class="product">
    <h2>Headphones</h2>
    <p>₹2,000</p>
    <button onclick="addToCart('Headphones', 2000)">Add to Cart</button>
  </div>

</section>

<section class="cart-box">
  <h2>Your Cart</h2>
  <ul id="cart-items"></ul>
  <h3>Total: ₹<span id="total">0</span></h3>
</section>

<script src="app.js"></script>
</body>
</html>
