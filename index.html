<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Shop</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">
        🛒 Mini E-Commerce Store
    </div>

    <div class="cart-icon">
        🛍️ Cart: <span id="cart-count">0</span>
    </div>
</header>

<section class="hero">
    <h1>Welcome to Mini Shop</h1>
    <p>Best Deals on Electronics</p>
</section>

<section class="title-section">
    <h2>Our Products</h2>
</section>

<section class="products">

    <div class="product">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=800" alt="Phone">
        <h3>Smart Phone</h3>
        <p class="price">₹15,000</p>
        <button onclick="addToCart('Smart Phone',15000)">
            🛒 Add To Cart
        </button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=800" alt="Laptop">
        <h3>Laptop</h3>
        <p class="price">₹55,000</p>
        <button onclick="addToCart('Laptop',55000)">
            🛒 Add To Cart
        </button>
    </div>

    <div class="product">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=800" alt="Headphones">
        <h3>Headphones</h3>
        <p class="price">₹2,000</p>
        <button onclick="addToCart('Headphones',2000)">
            🛒 Add To Cart
        </button>
    </div>

</section>

<section class="cart-box">

    <h2>🛍️ Shopping Cart</h2>

    <table>
        <thead>
            <tr>
                <th>Item</th>
                <th>Price</th>
            </tr>
        </thead>

        <tbody id="cart-items">
        </tbody>
    </table>

    <div class="total-box">
        Total: ₹<span id="total">0</span>
    </div>

    <button class="pay-btn" onclick="payNow()">
        💳 Pay Now
    </button>

</section>

<footer>
    © 2026 Mini Shop. All rights reserved.
</footer>

<script src="app.js"></script>

</body>
</html>
