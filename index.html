<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Mini E-Commerce Store</title>

    <meta name="description" content="Mini E-Commerce Store">

    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/891/891462.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="navbar">
    <div class="logo">🛒 Mini E-Commerce Store</div>
    <div class="cart-icon">🛍️ Cart: <span id="cart-count">0</span></div>
</header>

<!-- HERO -->
<section class="hero">
    <h1>Welcome to Mini Shop</h1>
    <p>Best Deals on Electronics & Accessories</p>
</section>

<!-- PRODUCTS -->
<main class="products">

    <div class="product electronics">
        <h3>Smart Phone</h3>
        <p>₹15000</p>
        <button onclick="addToCart('Smart Phone',15000)">Add To Cart</button>
    </div>

    <div class="product electronics">
        <h3>Laptop</h3>
        <p>₹55000</p>
        <button onclick="addToCart('Laptop',55000)">Add To Cart</button>
    </div>

</main>

<!-- CART -->
<section class="cart-box">

    <h2>🛍️ Cart</h2>

    <table>
        <tbody id="cart-items"></tbody>
    </table>

    <div>
        Total: ₹<span id="total">0</span>
    </div>

    <!-- PAY BUTTON -->
    <button class="pay-btn" id="payBtn" onclick="payNow()" disabled>
        💳 Pay Now
    </button>

</section>

<footer>
    © 2026 Mini Shop
</footer>

<script src="app.js"></script>

</body>
</html>
